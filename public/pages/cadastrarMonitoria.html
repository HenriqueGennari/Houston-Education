<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Monitoria</title>
    <link rel="shortcut icon" href="../assets/img/iconeHoustonEducation.ico" type="image/x-icon">

    <link rel="stylesheet" href="../style/estiloCadastrarMonitoria.css">
    <link rel="stylesheet" href="../style/styleNavMenuLateral.css">
    <script type="module" src="../scripts/menuLateral/menuLateral.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>

<body>
    <script type="module">
        import { parseJwt } from "../scripts/utils/parseJWT.js";

        const user = parseJwt(localStorage.getItem('token'));

        if (user.perfil !== "MONITOR" && user.perfil !== "ADMIN") {
            window.location.href = "naoAutorizado.html";
        }
    </script> <!--evitar do cara clicar com o botão direito e abrir-->

    <nav>
        <div class="icone iconeMenu">
            <a href="#">
                <img src="../assets/img/iconeMenu.png" alt="icone menu">
            </a>
        </div>
        <div class="logo">
            <a href="home.html">
                <img src="../assets/img/iconeHoustonEducation.ico" alt="logo Houston Education">
            </a>
        </div>
    </nav>

    <aside id="menuLateral" class="menuLateral">
        <div class="menuConteudo">
            <ul>
                <li>
                    <a href="home.html">
                        <img src="../assets/img/iconeHome.png" alt="Icone Home">
                        <span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="cadastrarMonitoria.html" id="linkCadastrarMonitoria">
                        <img src="../assets/img/iconeCadastrarMonitoria.png" alt="Icone Cadastrar Monitoria">
                        <span>Cadastrar Monitoria</span>
                    </a>
                </li>
                <li>
                    <a href="gerenciarMonitorias.html" id="linkGerenciarMonitoria">
                        <img src="../assets/img/iconeGerenciarMonitorias.png" alt="Icone Gerenciar Monitorias">
                        <span>Gerenciar Monitorias</span>
                    </a>
                </li>
                <li>
                    <a href="dashboardAdmin.html" id="linkDashboardAdmin.html">
                        <img src="../assets/img/iconeDashboardAdmin.png" alt="Icone Dashboard Admin">
                        <span>Dashboard Admin</span>
                    </a>
                </li>
                <li>
                    <a href="logout.html">
                        <span>Sair</span>
                    </a>
                </li>
            </ul>
        </div>
    </aside>

    <div id="overlay" class="overlay-menu"></div>

    <h1>Cadastrar Monitoria</h1>

    <form id="monitoriaForm">
        <div class="campoForm">
            <label>Nome da Monitoria</label>
            <input type="text" name="nome_monitoria" placeholder="Ex: Monitoria de Cálculo I">
        </div>

        <div class="campoForm">
            <label>Data da Monitoria</label>
            <input type="text" class="datepicker" name="data" placeholder="Selecione a data...">
        </div>

        <div class="campoForm">
            <label>Hora de Início</label>
            <input type="text" class="timepicker" name="hora_inicio" placeholder="Selecione o horário...">
        </div>

        <div class="campoForm">
            <label>Hora de Fim</label>
            <input type="text" class="timepicker" name="hora_fim" placeholder="Selecione o horário...">
        </div>

        <div class="campoForm">
            <label>Local da Monitoria</label>
            <input type="text" name="local" placeholder="Ex: Sala 101">
        </div>

        <div class="campoForm">
            <label>Descrição da Monitoria</label>
            <textarea name="descricao" rows="4"
                placeholder="Adicione detalhes, tópicos ou observações sobre a monitoria..."></textarea>
        </div>

        <div class="campoForm">
            <label>Selecione uma Disciplina</label>
            <select name="disciplinaId" id="disciplinas">
                <option value="" disabled selected>Selecione...</option>
            </select>
        </div>

        <div class="campoForm">
            <label>Selecione um(a) Monitor(a)</label>
            <select name="monitorId" id="monitores">
                <option value="" disabled selected>Selecione...</option>
            </select>
        </div>

        <button type="submit" id="botaoCriarMonitoria">Cadastrar Monitoria</button>
        <div id="mensagem"></div>
    </form>

    <script src="../scripts/disciplinas/carregarDisciplinas.js" type="module"></script>
    <script src="../scripts/monitores/carregarMonitores.js" type="module"></script>
    <script src="../scripts/monitorias/cadastrarMonitorias.js" type="module"></script>
    <script src="../scripts/utils/pickerData&Hora.js" type="module"></script>

</body>

</html>
