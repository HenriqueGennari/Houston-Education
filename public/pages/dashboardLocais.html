<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Locais</title>
    <link rel="shortcut icon" href="../assets/img/iconeHoustonEducation.ico" type="image/x-icon">

    <link rel="stylesheet" href="../style/styleNavMenuLateral.css">
    <link rel="stylesheet" href="../style/estiloDashboardAdmin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module" src="../scripts/menuLateral/menuLateral.js"></script>
    <script type="module" src="../scripts/menuLateral/ocultarAbasPorPerfil.js"></script>
</head>

<body>
    <script type="module">
        import { parseJwt } from "../scripts/utils/parseJWT.js";

        const user = parseJwt(localStorage.getItem('token'));

        if (user.perfil !== "MONITOR" && user.perfil !== "ADMIN") {
            window.location.href = "/pages/naoAutorizado.html";
        }
    </script>

    <nav>
        <div class="icone iconeMenu">
            <a href="#">
                <img src="../assets/img/iconeMenu.png" alt="icone menu">
            </a>
        </div>
        <div class="logo">
            <a href="/pages/home.html">
                <img src="../assets/img/iconeHoustonEducation.ico" alt="logo Houston Education">
            </a>
        </div>
        <div class="menu-usuario">
            <a href="/pages/logout.html" class="btn-sair">Sair</a>
        </div>
    </nav>

    <aside id="menuLateral" class="menuLateral">
        <div class="menuConteudo">
            <ul>
                <li>
                    <a href="/pages/home.html">
                        <img src="../assets/img/iconeHome.png" alt="Icone Home">
                        <span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="/pages/cadastrarMonitoria.html" id="linkCadastrarMonitoria">
                        <img src="../assets/img/iconeCadastrarMonitoria.png" alt="Icone Cadastrar Monitoria">
                        <span>Cadastrar Monitoria</span>
                    </a>
                </li>
                <li>
                    <a href="/gerenciar-monitorias" id="linkGerenciarMonitoria">
                        <img src="../assets/img/iconeGerenciarMonitorias.png" alt="Icone Gerenciar Monitorias">
                        <span>Gerenciar Monitorias</span>
                    </a>
                </li>
                <li>
                    <a href="/dashboard-admin" id="linkDashboardAdmin.html">
                        <img src="../assets/img/iconeDashboardAdmin.png" alt="Icone Dashboard Admin">
                        <span>Dashboard Admin</span>
                    </a>
                </li>
            </ul>
        </div>
    </aside>

    <div id="overlay" class="overlay-menu"></div>

    <div class="dashboard-header">
        <h1>Dashboard Admin</h1>
        <p>Gerencie os locais das monitorias</p>
    </div>

    <nav class="dashboard-tabs">
        <a href="/dashboard-admin">Usuarios</a>
        <a href="/dashboard-locais" class="active">Locais</a>
        <a href="/dashboard-disciplinas">Disciplinas</a>
        <a href="/dashboard-cursos">Cursos</a>
    </nav>

    <div class="dashboard-container">
        <div class="stats-grid">
            <div class="stat-card total">
                <div class="stat-label">Total de Locais</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
        </div>

        <div class="filtros-dashboard">
            <input type="text" id="buscaLocal" placeholder="Buscar por nome...">
            <button id="btnAbrirModalCriar" class="btn-adicionar-usuario">
                <i class="fas fa-plus"></i> Adicionar Local
            </button>
        </div>

        <div class="tabela-container">
            <table id="tabelaLocais">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Descricao</th>
                        <th>Campus</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4">Carregando locais...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="popupConfirmacao" class="popup hidden">
        <div class="popup-content">
            <p id="popupConfirmacaoTexto"></p>
            <div class="popup-botoes">
                <button id="btnConfirmarAcao" class="btn-confirmar">Confirmar</button>
                <button id="btnCancelarAcao" class="btn-fechar">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modalCriarLocal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Adicionar Local</h2>
                <span class="close-btn" id="btnFecharModalCriar">&times;</span>
            </div>
            <form id="formCriarLocal">
                <div class="campo-form-atualizar">
                    <label>Nome</label>
                    <input type="text" name="nome" placeholder="Nome do local" required>
                </div>
                <div class="campo-form-atualizar">
                    <label>Descricao</label>
                    <input type="text" name="descricao" placeholder="Descricao do local">
                </div>
                <div class="campo-form-atualizar">
                    <label>Campus</label>
                    <select name="campusId" id="campusSelectCriar" required>
                        <option value="" disabled selected>Selecione o campus...</option>
                    </select>
                </div>
                <button type="submit" id="btnSalvarLocal" class="btn-salvar-modal">Criar Local</button>
            </form>
        </div>
    </div>

    <div id="modalEditarLocal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Local</h2>
                <span class="close-btn" id="btnFecharModalEditar">&times;</span>
            </div>
            <form id="formEditarLocal">
                <input type="hidden" id="idLocalEditar" name="id">
                <div class="campo-form-atualizar">
                    <label>Nome</label>
                    <input type="text" name="nome" id="nomeLocalEditar" placeholder="Nome do local" required>
                </div>
                <div class="campo-form-atualizar">
                    <label>Descricao</label>
                    <input type="text" name="descricao" id="descricaoLocalEditar" placeholder="Descricao do local">
                </div>
                <div class="campo-form-atualizar">
                    <label>Campus</label>
                    <select name="campusId" id="campusSelectEditar" required>
                        <option value="" disabled selected>Selecione o campus...</option>
                    </select>
                </div>
                <button type="submit" id="btnSalvarEdicao" class="btn-salvar-modal">Salvar Alteracao</button>
            </form>
        </div>
    </div>

    <script type="module" src="../scripts/dashboardAdmin/dashboardLocais.js"></script>
</body>

</html>
