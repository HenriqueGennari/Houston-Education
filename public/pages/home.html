<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Houston Education</title>
    <link rel="shortcut icon" href="../assets/img/iconeHoustonEducation.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style/style.css?v=5">
    <link rel="stylesheet" href="../style/stylePopUp.css?v=5">
    <link rel="stylesheet" href="../style/styleNavMenuLateral.css?v=5">
    <script type="module" src="../scripts/menuLateral/menuLateral.js"></script>
    <script type="module" src="../scripts/menuLateral/ocultarAbasPorPerfil.js"></script>

    <!--Isso é para o picker quando atualizar as monitorias-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

</head>

<body class="pagina-home">
    <nav>
        <div class="icone iconeMenu">
            <a href="#">
                <img src="../assets/img/iconeMenu.png" alt="icone menu">
            </a>
        </div>
        <div class="logo">
            <a href="home.html">
                <img src="../assets/img/iconeHoustonEducation.ico" alt="logo Houston Education">
            </a>
        </div>
        <div class="menu-usuario">
            <a href="/pages/logout.html" class="btn-sair">Sair</a>
        </div>
    </nav>



    <aside id="menuLateral" class="menuLateral">
        <div class="menuConteudo">
            <ul>
                <li>
                    <a href="home.html">
                        <img src="../assets/img/iconeHome.png" alt="Icone Home">
                        <span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="/perfil" id="linkPerfil">
                        <img src="../assets/img/iconeUsuario.png" alt="Icone Perfil">
                        <span>Perfil</span>
                    </a>
                </li>
                <li>
                    <a href="cadastrarMonitoria.html" id="linkCadastrarMonitoria">
                        <img src="../assets/img/iconeCadastrarMonitoria.png" alt="Icone Cadastrar Monitoria">
                        <span>Cadastrar Monitoria</span>
                    </a>
                </li>
                <li class="submenu">
                    <a href="#" class="submenu-toggle" id="toggleMinhasMonitorias">
                        <img src="../assets/img/iconeGerenciarMonitorias.png" alt="Icone Minhas Monitorias">
                        <span>Minhas monitorias</span>
                        <span class="seta-submenu">&#9662;</span>
                    </a>
                    <ul class="submenu-lista">
                        <li>
                            <a href="/gerenciar-monitorias" id="linkGerenciarMonitoria">
                                <span>Gerenciar Monitorias</span>
                            </a>
                        </li>
                        <li>
                            <a href="/pages/historicoMonitorias.html" id="linkHistoricoMonitorias">
                                <span>Histórico de Monitorias</span>
                            </a>
                        </li>
                    </ul>
                </li>
                <li>
                    <a href="/dashboard-admin" id="linkDashboardAdmin.html">
                        <img src="../assets/img/iconeDashboardAdmin.png" alt="Icone Dashboard Admin">
                        <span>Dashboard Admin</span>
                    </a>
                </li>
            </ul>
        </div>
    </aside>

    <div id="overlay" class="overlay-menu"></div>

    <div class="boasvindas">
        <h1>
            Bem vindo, <span class="usuarioNome"></span>!
        </h1>

        <div class="divBuscar">
            <div class="input-busca-wrapper">
                <img src="../assets/img/lupa.png" alt="" class="icone-lupa">
                <input type="text" id="buscaMonitoria" placeholder="Buscar monitoria ou curso...">
            </div>
            <select id="ordenarMonitorias" class="select-ordenar">
                <option value="recente">Mais recente</option>
                <option value="antiga">Mais antiga</option>
            </select>
        </div>
    </div>

    <section class="sectionmonitorias">.
        <div class="exibirmonitorias">
            <h2 id="titulomonitorias">Monitorias Disponíveis</h2>
            <div class="tabs-campus" id="tabsCampus">
                <button class="tab-btn active" data-campus="todas">Todas</button>
            </div>
            <ul id="listamonitorias">
                <li>Carregando monitorias...</li>
            </ul>
        </div>
    </section>

    <!--POPUP DAS MONITORIAS CABULOSAS-->

    <div id="popupInfoMonitoria" class="popup hidden">
        <div class="popup-content">
            <h2 id="popupTitulo"></h2>
            <p id="popupDisciplina"></p>
            <p id="popupMonitor"></p>
            <p id="popupLocal"></p>
            <p id="popupDataHora"></p>
            <p id="popupDescricao"></p>
        </div>
    </div>


    <!-- POPUP DE SUCESSO -->
    <div id="popupSucessoAtualizar" class="popup-sucesso hidden">
        <div class="popup-sucesso-content">
            <button class="popup-sucesso-fechar" id="btnFecharPopupSucesso">&times;</button>
            <span class="popup-sucesso-icone">&#10004;</span>
            <p>Monitoria atualizada com sucesso!</p>
            <a href="home.html">Ver monitorias</a>
        </div>
    </div>

    <!--MODAL PARA ATUALIZAR AS MONITORIAS-->

    <div id="modalOverlay" class="modal-overlay">
        <input type="hidden" id="id_monitoria_hidden" name="id_monitoria">

        <div class="modal-content">
            <div class="modal-header">
                <h2>Atualizar Monitoria</h2>
                <span class="close-btn">&times;</span>
            </div>

            <form id="formAtualizarMonitoria">
                <div class="campo-form-atualizar">
                    <label>Nome</label>
                    <input type="text" name="nome_monitoria">
                </div>

                <div class="campo-form-atualizar">
                    <label>Descrição</label>
                    <input name="descricao" placeholder="Adicione detalhes, tópicos ou observações..."></input>
                </div>

                <div class="campo-form-atualizar">
                    <label>Data</label>
                    <input type="text" class="datepicker" name="data" placeholder="Selecione a data...">
                </div>

                <div class="campo-form-atualizar">
                    <label>Hora Inicio</label>
                    <input type="text" class="timepicker" name="hora_inicio">
                </div>

                <div class="campo-form-atualizar">
                    <label>Hora Fim</label>
                    <input type="text" class="timepicker" name="hora_fim">
                </div>

                <div class="campo-form-atualizar">
                    <label>Selecione um local</label>
                    <select name="localId" id="locais">
                        <option value="" disabled selected>Selecione...</option>
                    </select>
                </div>

                <div class="campo-form-atualizar">
                    <label>Selecione uma disciplina</label>
                    <select name="disciplinaId" id="disciplinas">
                        <option value="" disabled selected>Selecione...</option>
                    </select>
                </div>

                <button id="submit_btn_atualizar">Salvar Alterações</button>
            </form>
        </div>
    </div>


    <script type="module" src="../scripts/carregarNomeUsuario.js?v=4"></script>
    <script type="module" src="../scripts/monitorias/carregarMonitorias.js?v=4"></script>
    <script type="module" src="../scripts/monitorias/autorizadoMonitorias.js?v=4"></script>
    <script type="module" src="../scripts/disciplinas/carregarDisciplinas.js?v=4"></script>
    <script type="module" src="../scripts/locais/carregarLocais.js?v=4"></script>
    <script src="../scripts/utils/pickerData&Hora.js?v=4" type="module"></script>


</body>

</html>
