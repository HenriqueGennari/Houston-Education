<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
    <link rel="shortcut icon" href="../assets/img/iconeHoustonEducation.ico" type="image/x-icon">

    <link rel="stylesheet" href="../style/styleNavMenuLateral.css">
    <link rel="stylesheet" href="../style/estiloDashboardAdmin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module" src="../scripts/menuLateral/menuLateral.js"></script>
    <script type="module" src="../scripts/menuLateral/ocultarAbasPorPerfil.js"></script>
</head>

<body>
    <script type="module">
        import { parseJwt } from "../scripts/utils/parseJWT.js";

        const user = parseJwt(localStorage.getItem('token'));

        if (user.perfil !== "MONITOR" && user.perfil !== "ADMIN") {
            window.location.href = "naoAutorizado.html";
        }
    </script> <!--evitar do cara clicar com o botão direito e abrir-->

    <nav>
        <div class="icone iconeMenu">
            <a href="#">
                <img src="../assets/img/iconeMenu.png" alt="icone menu">
            </a>
        </div>
        <div class="logo">
            <a href="/pages/home.html">
                <img src="../assets/img/iconeHoustonEducation.ico" alt="logo Houston Education">
            </a>
        </div>
        <div class="menu-usuario">
            <a href="logout.html" class="btn-sair">Sair</a>
        </div>
    </nav>

    <aside id="menuLateral" class="menuLateral">
        <div class="menuConteudo">
            <ul>
                <li>
                    <a href="/pages/home.html">
                        <img src="../assets/img/iconeHome.png" alt="Icone Home">
                        <span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="/pages/cadastrarMonitoria.html" id="linkCadastrarMonitoria">
                        <img src="../assets/img/iconeCadastrarMonitoria.png" alt="Icone Cadastrar Monitoria">
                        <span>Cadastrar Monitoria</span>
                    </a>
                </li>
                <li>
                    <a href="/gerenciar-monitorias" id="linkGerenciarMonitoria">
                        <img src="../assets/img/iconeGerenciarMonitorias.png" alt="Icone Gerenciar Monitorias">
                        <span>Gerenciar Monitorias</span>
                    </a>
                </li>
                <li>
                    <a href="/dashboard-admin" id="linkDashboardAdmin.html">
                        <img src="../assets/img/iconeDashboardAdmin.png" alt="Icone Dashboard Admin">
                        <span>Dashboard Admin</span>
                    </a>
                </li>
            </ul>
        </div>
    </aside>

    <div id="overlay" class="overlay-menu"></div>

    <div class="dashboard-header">
        <h1>Dashboard Admin</h1>
        <p>Gerencie usuarios, perfis e permissoes do sistema</p>
    </div>

    <div class="dashboard-container">
        <div class="stats-grid">
            <div class="stat-card total">
                <div class="stat-label">Total de Usuários</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
        </div>

        <div class="filtros-dashboard">
            <input type="text" id="buscaUsuario" placeholder="Buscar por nome, email ou matricula...">
            <select id="filtroPerfil">
                <option value="">Todos os perfis</option>
                <option value="ADMIN">Admin</option>
                <option value="MONITOR">Monitor</option>
                <option value="ALUNO">Aluno</option>
            </select>
        </div>

        <div class="tabela-container">
            <table id="tabelaUsuarios">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Email</th>
                        <th>Matrícula</th>
                        <th>Perfil</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5">Carregando usuários...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="popupConfirmacao" class="popup hidden">
        <div class="popup-content">
            <p id="popupConfirmacaoTexto"></p>
            <div class="popup-botoes">
                <button id="btnConfirmarAcao" class="btn-confirmar">Confirmar</button>
                <button id="btnCancelarAcao" class="btn-fechar">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modalEditarPerfil" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Perfil</h2>
                <span class="close-btn" id="btnFecharModalEditar">&times;</span>
            </div>
            <form id="formEditarPerfil">
                <input type="hidden" id="idUsuarioEditar" name="idUsuario">
                <div class="campo-form-atualizar">
                    <label>Usuário</label>
                    <input type="text" id="nomeUsuarioEditar" readonly>
                </div>
                <div class="campo-form-atualizar">
                    <label>Perfil Atual</label>
                    <input type="text" id="perfilAtualEditar" readonly>
                </div>
                <div class="campo-form-atualizar">
                    <label>Novo Perfil</label>
                    <select id="novoPerfilEditar" name="perfilId">
                        <option value="1">Admin</option>
                        <option value="2">Monitor</option>
                        <option value="3">Aluno</option>
                    </select>
                </div>
                <button type="submit" id="btnSalvarPerfil">Salvar Alteração</button>
            </form>
        </div>
    </div>

    <script type="module" src="../scripts/dashboardAdmin/dashboardAdmin.js"></script>
</body>

</html>
